TRAIN:
  DATASET: 'binary_start'
  BATCH_SIZE: 1
  CHECKPOINT_PERIOD: 1
  AUTO_RESUME: False
  EVAL_SPLIT: 'test'
DATA:
  CV_SPLIT_NUM: 1
  BACKGROUND_INDICES: [0, 1]
  # Default binary mapping (background / activeSurgery), matches the released
  # active surgery checkpoint. Override on the CLI to use your own mapping file.
  PATH_TO_MAPPING_FILE: 'step_model/mapping_files/active_surgery.txt'

SOLVER:
  BASE_LR: 0.00025
  MAX_EPOCH: 150
  WEIGHT_DECAY: 10e-4
  OPTIMIZING_METHOD: 'adam'
  LR_POLICY: 'constant_cosine_decay'
  WARMUP_EPOCHS: 15
  T_MAX: 180
MODEL:
  NAME: 'ltc'
  LOSS_FUNC: 'ce_mse'
  MSE_LOSS_FRACTION: 0.17
  NUM_CLASSES: 2
  INPUT_DIM: 768
  LTC:
    NUM_LAYERS: 10
    NUM_STAGES: 4
    MODEL_DIM: 64
    WINDOWED_ATTN_W: 64
    LONG_TERM_ATTN_G: 64
    CHANNEL_MASKING_PROB: 0.3
DATA_LOADER:
  NUM_WORKERS: 2
  PIN_MEMORY: True
TEST:
  DATASET: 'binary_start'
NUM_GPUS: 4
LOG_PERIOD: 20